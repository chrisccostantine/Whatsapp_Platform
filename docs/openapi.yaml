openapi: 3.1.0
info: { title: Scalora CRM API, version: 0.1.0 }
servers: [{ url: /api/v1 }]
paths:
  /health: { get: { summary: Service health, responses: { '200': { description: Healthy } } } }
  /auth/register: { post: { summary: Register owner and workspace, responses: { '201': { description: Created } } } }
  /auth/login: { post: { summary: Sign in, responses: { '200': { description: Authenticated }, '401': { description: Invalid credentials } } } }
  /auth/refresh: { post: { summary: Rotate refresh token, responses: { '200': { description: Refreshed } } } }
  /auth/me: { get: { summary: Current user and workspace, security: [{ bearerAuth: [] }], responses: { '200': { description: Current session } } } }
  /business/onboarding: { patch: { summary: Complete owner onboarding, security: [{ bearerAuth: [] }], responses: { '200': { description: Updated } } } }
  /customers: { get: { summary: List tenant customers, security: [{ bearerAuth: [] }], responses: { '200': { description: Customer page } } }, post: { summary: Create customer, security: [{ bearerAuth: [] }], responses: { '201': { description: Created } } } }
  /customers/{id}: { parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }], get: { summary: Customer profile, security: [{ bearerAuth: [] }], responses: { '200': { description: Customer } } }, patch: { summary: Update customer, security: [{ bearerAuth: [] }], responses: { '200': { description: Updated } } }, delete: { summary: Soft-delete customer, security: [{ bearerAuth: [] }], responses: { '200': { description: Deleted } } } }
  /follow-ups: { get: { summary: List follow-ups, security: [{ bearerAuth: [] }], responses: { '200': { description: Follow-ups } } }, post: { summary: Create follow-up, security: [{ bearerAuth: [] }], responses: { '201': { description: Created } } } }
  /pipeline: { get: { summary: Get tenant pipeline, security: [{ bearerAuth: [] }], responses: { '200': { description: Pipeline } } } }
  /dashboard/summary: { get: { summary: Phase 1 metrics, security: [{ bearerAuth: [] }], responses: { '200': { description: Dashboard summary } } } }
  /conversations: { get: { summary: List tenant conversations, security: [{ bearerAuth: [] }], responses: { '200': { description: Conversation page } } }, post: { summary: Open a mock conversation for a customer, security: [{ bearerAuth: [] }], responses: { '201': { description: Conversation ready } } } }
  /conversations/{id}: { parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }], get: { summary: Conversation messages and internal notes, security: [{ bearerAuth: [] }], responses: { '200': { description: Conversation detail } } } }
  /conversations/{id}/messages: { parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }], post: { summary: Send a public message, security: [{ bearerAuth: [] }], responses: { '201': { description: Message accepted } } } }
  /conversations/{id}/internal-notes: { parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }], post: { summary: Add an employee-only note, security: [{ bearerAuth: [] }], responses: { '201': { description: Note created } } } }
  /conversations/{id}/assignment: { parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }], patch: { summary: Assign an active workspace member, security: [{ bearerAuth: [] }], responses: { '200': { description: Assignment updated } } } }
  /conversations/mock/incoming: { post: { summary: Simulate an inbound WhatsApp message in development, security: [{ bearerAuth: [] }], responses: { '201': { description: Message received }, '409': { description: Mock provider disabled in production } } } }
  /whatsapp/webhook: { get: { summary: Verify Meta webhook subscription, responses: { '200': { description: Challenge accepted } } }, post: { summary: Receive a signed Meta webhook event, responses: { '200': { description: Event persisted for processing }, '401': { description: Invalid signature } } } }
  /whatsapp/account: { get: { summary: Get connection metadata without credentials, security: [{ bearerAuth: [] }], responses: { '200': { description: Connection metadata } } }, delete: { summary: Disconnect WhatsApp, security: [{ bearerAuth: [] }], responses: { '200': { description: Disconnected } } } }
  /whatsapp/account/connect: { post: { summary: Connect and validate WhatsApp credentials, security: [{ bearerAuth: [] }], responses: { '201': { description: Connected } } } }
  /whatsapp/templates: { get: { summary: List synchronized templates, security: [{ bearerAuth: [] }], responses: { '200': { description: Templates } } } }
  /whatsapp/templates/sync: { post: { summary: Synchronize templates from Meta, security: [{ bearerAuth: [] }], responses: { '200': { description: Synchronized } } } }
  /whatsapp/templates/{templateId}/send: { parameters: [{ name: templateId, in: path, required: true, schema: { type: string, format: uuid } }], post: { summary: Send an approved template with variables, security: [{ bearerAuth: [] }], responses: { '201': { description: Template message sent } } } }
components:
  securitySchemes: { bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT } }
