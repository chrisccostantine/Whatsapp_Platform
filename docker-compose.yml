services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scalora
      POSTGRES_USER: scalora
      POSTGRES_PASSWORD: scalora
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scalora"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  postgres_data:

